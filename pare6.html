<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ประวัติ</title>

<style>

body{
    font-family: "Sarabun", sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    margin:0;
}

/* กล่องโปรไฟล์ */
.card{
    width:420px;
    margin:120px auto;
    background:white;
    border-radius:20px;
    padding:60px 40px 40px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

/* รูปโปรไฟล์ */
.profile img{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid white;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    margin-top:-120px;
}

/* ชื่อ */
h1{
    color:#333;
    margin-top:15px;
    font-size:26px;
}

/* เส้น */
hr{
    margin:25px 0;
    border:none;
    height:2px;
    background:#eee;
}

/* ข้อมูล */
.info{
    text-align:left;
    font-size:16px;
    line-height:2.1;
    color:#555;
}

/* ปุ่ม */
button{
    margin-top:25px;
    padding:10px 20px;
    border:none;
    border-radius:25px;
    background:linear-gradient(45deg,#36d1dc,#5b86e5);
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="card">

<div class="profile">
<img src="img/ee.jpg">
</div>

<h1>👤 ประวัติ นางสาวมธุรดา</h1>

<hr>

<div class="info">

1. ชื่อ : มธุรดา ไปนอก <br>
2. ชื่อเล่น : แยม <br>
3. อายุ : 20 ปี <br>
4. สาขาวิชา : เทคโนโลยีธุรกิจดิจิทัล <br>
5. ระดับชั้น : ปวส.1 <br>
6. โรงเรียน : วิทยาลัยเทคนิคมวกเหล็ก <br>
7. งานอดิเรก : เล่นเกม <br>
8. ความสามารถพิเศษ : การเขียนโปรแกรม <br>
9. วิชาที่ชอบ : การสร้างเว็บไซต์ <br>
10. อาชีพในฝัน : โปรแกรมเมอร์

</div>

<a href="index.html">
<button>⬅ กลับหน้าหลัก</button>
</a>

</div>

</body>
</html>
